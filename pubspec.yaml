name: bible_io
description: A modern Dart package for loading and working with structured Bible text data, featuring async loading, operator overloading, functional error handling, and comprehensive search capabilities.
version: 1.0.0
homepage: https://github.com/m0ty/bible-io-dart
repository: https://github.com/m0ty/bible-io-dart
issue_tracker: https://github.com/m0ty/bible-io-dart/issues
documentation: https://github.com/m0ty/bible-io-dart#readme

environment:
  sdk: ^3.10.7

topics:
  - bible
  - scripture
  - text-processing
  - search
  - async

# Add regular dependencies here.
dependencies:
  bible_io_references: ^1.0.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
  benchmark_harness: ^2.2.1
  coverage: ^1.6.3
